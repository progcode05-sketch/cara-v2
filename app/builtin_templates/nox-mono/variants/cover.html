<div class="slide nx-mono" data-author-name="Your Name" data-author-role="Your Title">
          <div class="nx-brand ghost nx-user-brand"><div class="nx-mark" style="background-image:url('{{author_picture}}')">{{author_initial}}</div><span class="nx-user-name-top">{{author_name}}</span></div>
          <div class="nx-mono-line"></div>
          <div class="top">
            <div class="nx-brand ghost legacy" style="display:none"><div class="nx-mark">{{author_initial}}</div>noxlin</div>
            <div>{{page_number}}</div>
          </div>
          <div class="kicker">— LINKEDIN HOOK FORMULA</div>
          <div class="hero">5 lines.<br>700% more <em>reads</em>.</div>
          <div class="nx-footer">
            <div class="nx-author">
              <div class="av" style="background-image:url(&apos;{{author_picture}}&apos;)">{{author_initial}}</div>
              <div>
                <div class="name">{{author_name}}</div>
                <div class="handle">{{author_handle}}</div>
              </div>
            </div>
            <div class="nx-arrow">{{swipe_label}}</div>
          </div>
        
          <div class="nx-stamp"><span class="sp-dot"></span>CRAFTED BY <span class="sp-serif">{{stamp_brand}}</span> · {{stamp_site}}</div>
        </div>
