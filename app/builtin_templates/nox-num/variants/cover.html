<div class="slide nx-num cover">
          <div class="top">
            <div>{{brand_site}}</div>
            <div>{{page_number}}</div>
          </div>
          <div class="numeral">{{numeral}}</div>
          <div class="ndots"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="hero-wrap">
            <div class="hero">{{hero}}</div>
            <div class="sub">{{sub}}</div>
          </div>
          <div class="nx-footer">
            <div class="nx-author">
              <div class="av" style="background: rgba(255,255,255,0.18); border: 2px solid rgba(255,255,255,0.35);">{{author_initial}}</div>
              <div>
                <div class="name" style="color:#fff">{{author_name}}</div>
                <div class="handle" style="color:rgba(255,255,255,0.75)">{{author_handle}}</div>
              </div>
            </div>
            <div class="bookmark"></div>
          </div>
        
          <div class="nx-stamp"><span class="sp-dot"></span>CRAFTED BY <span class="sp-serif">{{stamp_brand}}</span> · {{stamp_site}}</div>
        </div>
