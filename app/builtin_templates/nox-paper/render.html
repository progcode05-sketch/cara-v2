<div class="slide nx-paper">
          <div class="top">
            <div class="issue"><b>{{issue_label}}</b><br>{{issue_topic}}<br>{{issue_date}}</div>
            <div class="nx-brand ghost nx-user-brand"><div class="nx-mark" style="background-image:url('{{author_picture}}')">{{author_initial}}</div><span class="nx-user-name-top">{{author_name}}</span></div>
          </div>
          <div class="hero-wrap">
            <div class="hero-intro">{{hero_intro}}</div>
            <div class="hero">{{hero}}</div>
          </div>
          <div class="sub">{{sub}}</div>
          <div class="nx-footer">
            <div class="nx-author">
              <div class="av" style="background: linear-gradient(135deg, var(--nx-blue-light), var(--nx-blue-dark));">{{author_initial}}</div>
              <div>
                <div class="name" style="color: var(--nx-black);">{{author_name}}</div>
                <div class="handle" style="color: var(--nx-muted);">{{author_handle}} · {{page_number}}</div>
              </div>
            </div>
            <div class="nx-arrow">{{swipe_label}}</div>
          </div>
        
          <div class="nx-stamp"><span class="sp-dot"></span>CRAFTED BY <span class="sp-serif">{{stamp_brand}}</span> · {{stamp_site}}</div>
        </div>
