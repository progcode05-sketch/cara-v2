<div class="slide nx-paper content">
          <div class="top">
            <div class="issue"><b>{{issue_label}}</b><br>{{issue_chapter}}</div>
            <div class="nx-brand ghost nx-user-brand"><div class="nx-mark" style="background-image:url('{{author_picture}}')">{{author_initial}}</div><span class="nx-user-name-top">{{author_name}}</span></div>
          </div>
          <div class="hero-wrap">
            <div class="hero">{{hero}}</div>
          </div>
          <div class="body">{{body_html}}</div>
          <div class="windows-mark">
            <div class="wm"><div class="wm-day">TUE · 8–10</div><div class="wm-time">Story</div><div class="wm-type">1,200-char dwell</div></div>
            <div class="wm"><div class="wm-day">WED · 12–2</div><div class="wm-time">Carousel</div><div class="wm-type">5-slide saves</div></div>
            <div class="wm"><div class="wm-day">THU · 6–8</div><div class="wm-time">Opinion</div><div class="wm-type">1-line replies</div></div>
            <div class="wm"><div class="wm-day">SAT · 9–11</div><div class="wm-time">Lesson</div><div class="wm-type">long-form skim</div></div>
          </div>
        
          <div class="nx-stamp"><span class="sp-dot"></span>CRAFTED BY <span class="sp-serif">{{stamp_brand}}</span> · {{stamp_site}}</div>
        </div>
